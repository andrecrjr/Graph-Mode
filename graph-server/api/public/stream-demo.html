<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Graph Stream Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            color: #333;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: bold;
        }

        input,
        button {
            padding: 0.5rem;
            font-size: 1rem;
        }

        button {
            cursor: pointer;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 0.25rem;
            padding: 0.5rem 1rem;
        }

        button:disabled {
            background-color: #93c5fd;
            cursor: not-allowed;
        }

        .progress-container {
            width: 100%;
            height: 2rem;
            background-color: #e5e7eb;
            border-radius: 0.5rem;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-bar {
            height: 100%;
            background-color: #2563eb;
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            margin-bottom: 1rem;
        }

        #elements-container {
            margin-top: 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .error {
            background-color: #fee2e2;
            color: #ef4444;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <h1>Notion Graph Stream Demo</h1>

    <div class="container">
        <div class="form-group">
            <label for="token">Authorization Token:</label>
            <input type="text" id="token" placeholder="Enter your auth token">
        </div>

        <div class="form-group">
            <label for="block-id">Block ID:</label>
            <input type="text" id="block-id" placeholder="Enter Notion block ID">
        </div>

        <div class="form-group">
            <button id="connect-btn">Connect Stream</button>
            <button id="disconnect-btn" disabled>Disconnect</button>
        </div>

        <div id="error-container" class="error hidden"></div>

        <div id="status-container" class="status">
            Status: <span id="status">Not connected</span>
        </div>

        <div class="progress-container hidden" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="metrics-container"></div>

        <h2>Elements</h2>
        <div id="elements-container">
            <p>Connect to a stream to see elements</p>
        </div>
    </div>

    <script src="example-stream.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const connectBtn = document.getElementById('connect-btn');
            const disconnectBtn = document.getElementById('disconnect-btn');
            const tokenInput = document.getElementById('token');
            const blockIdInput = document.getElementById('block-id');
            const statusElement = document.getElementById('status');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const elementsContainer = document.getElementById('elements-container');
            const errorContainer = document.getElementById('error-container');
            const metricsContainer = document.getElementById('metrics-container');

            let client = null;

            // Toggle button states
            function setConnected(isConnected) {
                connectBtn.disabled = isConnected;
                disconnectBtn.disabled = !isConnected;
                tokenInput.disabled = isConnected;
                blockIdInput.disabled = isConnected;
            }

            // Update UI with status
            function updateStatus(message) {
                statusElement.textContent = message;
            }

            // Show progress bar and update it
            function updateProgress(percent) {
                progressContainer.classList.remove('hidden');
                progressBar.style.width = `${percent}%`;
            }

            // Show error message
            function showError(message) {
                errorContainer.textContent = message;
                errorContainer.classList.remove('hidden');
            }

            // Hide error message
            function hideError() {
                errorContainer.classList.add('hidden');
            }

            // Handle the connect button click
            connectBtn.addEventListener('click', () => {
                const token = tokenInput.value.trim();
                const blockId = blockIdInput.value.trim();

                // Validate inputs
                if (!token) {
                    showError('Please enter an authorization token');
                    return;
                }

                if (!blockId) {
                    showError('Please enter a block ID');
                    return;
                }

                hideError();
                updateStatus('Connecting...');
                elementsContainer.innerHTML = '<p>Loading elements...</p>';

                // Create a new client
                client = new NotionStreamClient('', token);

                // Set up event handlers
                client
                    .on('status', (data) => {
                        updateStatus(data.message);
                    })
                    .on('progress', (data) => {
                        updateProgress(data.progress);
                        updateStatus(`Loading... ${data.progress}%`);

                        // Update metrics
                        metricsContainer.innerHTML = `
              <p>Request count: ${data.requestCount} / ${data.requestLimit}</p>
            `;
                    })
                    .on('batch', (data) => {
                        // Update the elements container with new elements
                        renderElements(data.elements);
                    })
                    .on('complete', (data) => {
                        updateStatus('Complete!');
                        renderElements(data.elements);

                        // Update metrics
                        metricsContainer.innerHTML = `
              <p>User tier: ${data.tier}</p>
              <p>VIP: ${data.isVip ? 'Yes' : 'No'}</p>
              <p>Total requests: ${data.requestCount} / ${data.requestLimit}</p>
            `;
                    })
                    .on('error', (error) => {
                        updateStatus('Error');
                        showError(error.message);
                        setConnected(false);
                    });

                // Connect to the stream
                client.connect(blockId)
                    .then(() => {
                        setConnected(true);
                    })
                    .catch((error) => {
                        showError(`Connection failed: ${error.message || 'Unknown error'}`);
                        updateStatus('Connection failed');
                    });
            });

            // Handle the disconnect button click
            disconnectBtn.addEventListener('click', () => {
                if (client) {
                    client.disconnect();
                    client = null;

                    updateStatus('Disconnected');
                    setConnected(false);
                    progressContainer.classList.add('hidden');
                }
            });

            // Render elements to the container
            function renderElements(elements) {
                if (!elements || elements.length === 0) {
                    elementsContainer.innerHTML = '<p>No elements found</p>';
                    return;
                }

                elementsContainer.innerHTML = '<pre>' + JSON.stringify(elements, null, 2) + '</pre>';
            }
        });
    </script>
</body>

</html>
